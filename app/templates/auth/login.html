{% extends "base.html" %}

{% block content %}
<style>
    /* Styles moved to global style.css for auth-container, auth-card, google-btn */
</style>

<div class="auth-container mesh-bg">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-heart-pulse" style="font-size: 2.5rem; color: var(--primary);"></i>
            <h4 class="mt-3 mb-1">Welcome back</h4>
            <p class="text-muted mb-0">Sign in to continue</p>
        </div>

        <form method="POST" action="" class="mt-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Email address" required>
            </div>

            <div class="mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                Sign In
            </button>
        </form>

        <div class="text-center my-3">
            <span class="text-muted">or</span>
        </div>

        <a href="{{ url_for('auth.google_login') }}" class="google-btn d-flex align-items-center justify-content-center text-decoration-none">
            <svg width="18" height="18" viewBox="0 0 48 48" class="me-2">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Continue with Google
        </a>

        <p class="text-center mt-4 mb-0">
            <span class="text-muted">Don't have an account?</span>
            <a href="{{ url_for('auth.register') }}" class="text-decoration-none" style="color: var(--primary);">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
