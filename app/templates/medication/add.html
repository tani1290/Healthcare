{% extends "base.html" %}

{% block content %}
<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        --card-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    body {
        background: #f8f9fa;
    }
    
    .premium-card {
        background: white;
        border-radius: 20px;
        box-shadow: var(--card-shadow);
        border: none;
    }
    
    .gradient-header {
        background: var(--primary-gradient);
        border-radius: 20px 20px 0 0;
        padding: 25px;
        color: white;
    }
    
    .form-control, .form-select {
        border-radius: 12px;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    .form-label {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
    }
    
    .btn-primary {
        background: var(--primary-gradient);
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
        padding: 12px 30px;
        border-radius: 25px;
        font-weight: 600;
    }
    
    .back-link {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    
    .back-link:hover {
        color: #764ba2;
    }
</style>

<div class="container-fluid py-4">
    <div class="mb-4">
        <a href="{{ url_for('medication.dashboard') }}" class="back-link">
            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="premium-card">
                <div class="gradient-header">
                    <h4 class="mb-0"><i class="fas fa-pills me-2"></i>Add New Medication</h4>
                    <p class="mb-0 mt-2 opacity-75">Enter your medication details below</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="medicine_name" class="form-label">
                                    <i class="fas fa-capsules me-1"></i>Medicine Name *
                                </label>
                                <input type="text" class="form-control" id="medicine_name" name="medicine_name" required placeholder="e.g. Aspirin, Metformin">
                            </div>
                            <div class="col-md-6">
                                <label for="dosage" class="form-label">
                                    <i class="fas fa-weight me-1"></i>Dosage
                                </label>
                                <input type="text" class="form-control" id="dosage" name="dosage" placeholder="e.g. 500mg, 10ml, 2 tablets">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="frequency" class="form-label">
                                    <i class="fas fa-clock me-1"></i>Frequency
                                </label>
                                <select class="form-select" id="frequency" name="frequency">
                                    <option value="">Select frequency</option>
                                    <option value="1-0-0">Once daily (Morning)</option>
                                    <option value="0-1-0">Once daily (Afternoon)</option>
                                    <option value="0-0-1">Once daily (Evening)</option>
                                    <option value="1-1-1">Three times daily</option>
                                    <option value="1-1-0">Twice daily (Morning, Afternoon)</option>
                                    <option value="1-0-1">Twice daily (Morning, Evening)</option>
                                    <option value="0-1-1">Twice daily (Afternoon, Evening)</option>
                                    <option value="1-0-0-0">Four times daily</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="times" class="form-label">
                                    <i class="fas fa-time me-1"></i>Times (comma separated) *
                                </label>
                                <input type="text" class="form-control" id="times" name="times" required placeholder="e.g. 08:00, 14:00, 20:00">
                                <small class="text-muted">Enter times in 24-hour format</small>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="timing" class="form-label">
                                    <i class="fas fa-utensils me-1"></i>When to Take
                                </label>
                                <select class="form-select" id="timing" name="timing">
                                    <option value="">Select timing</option>
                                    <option value="Before Food">Before Food</option>
                                    <option value="After Food">After Food</option>
                                    <option value="With Food">With Food</option>
                                    <option value="Empty Stomach">Empty Stomach</option>
                                    <option value="At Bedtime">At Bedtime</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="start_date" class="form-label">
                                    <i class="fas fa-calendar-plus me-1"></i>Start Date *
                                </label>
                                <input type="date" class="form-control" id="start_date" name="start_date" required value="{{ today.strftime('%Y-%m-%d') }}">
                            </div>
                            <div class="col-md-3">
                                <label for="end_date" class="form-label">
                                    <i class="fas fa-calendar-check me-1"></i>End Date
                                </label>
                                <input type="date" class="form-control" id="end_date" name="end_date">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="{{ url_for('medication.dashboard') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus me-2"></i>Add Medication
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('frequency').addEventListener('change', function() {
    const timesInput = document.getElementById('times');
    const frequency = this.value;
    
    const timeMap = {
        '1-0-0': '08:00',
        '0-1-0': '14:00',
        '0-0-1': '20:00',
        '1-1-1': '08:00, 14:00, 20:00',
        '1-1-0': '08:00, 14:00',
        '1-0-1': '08:00, 20:00',
        '0-1-1': '14:00, 20:00',
        '1-0-0-0': '08:00, 12:00, 16:00, 20:00'
    };
    
    if (frequency && timeMap[frequency]) {
        timesInput.value = timeMap[frequency];
    }
});
</script>
{% endblock %}
